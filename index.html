<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <header>
        <nav aria-label="Navegación principal">
            <ul class="nav-right-section">
                <li><a href="https://mail.google.com/">Gmail</a></li>
                <li><a href="https://images.google.com/">Imágenes</a></li>
                <li><a href="#" aria-label="Aplicaciones"><img id="icono_apps"src="https://us.123rf.com/450wm/helena777/helena7771908/helena777190800932/129208005-different-icons-of-signs-and-symbols-for-phones-mobile-and-laptops-vector-illustration.jpg"alt=""></a>
                </li>
                <li>
                    <a href="#" aria-label="Perfil"><img class="perfil"src="https://cdn-icons-png.flaticon.com/512/149/149071.png"alt=""></a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="logo-section">
            <img class="logo"
                src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/3840px-Google_2015_logo.svg.png"
                alt="Google">
        </section>

        <section class="search-section">
            <form action="#" role="search" class="search-container">

                <button type="button" class="icon-btn icon-add" aria-label="Agregar">
                    <img src="https://icon-icons.com/download-file?file=https%3A%2F%2Fimages.icon-icons.com%2F930%2FPNG%2F512%2Fplus_icon-icons.com_72294.png&id=72294&pack_or_individual=pack"
                        alt="">
                </button>

                <input type="text" class="search-box" placeholder="Buscar en Google" name="q">

                <button type="button" class="icon-btn icon-mic" aria-label="Micrófono">
                    <img src="https://cdn-icons-png.flaticon.com/512/26/26706.png"
                        alt="">
                </button>

                <button type="button" class="icon-btn icon-cam" aria-label="Cámara">
                    <img src="https://static.vecteezy.com/system/resources/previews/028/766/357/non_2x/google-camera-lens-icon-symbol-free-png.png"
                        alt="">
                </button>

                <button type="button" class="icon-btn icon-ia" aria-label="Modo IA">
                    <img src="https://www.optimizacion-online.com/wp-content/uploads/2025/10/modo-ia-min.jpg"
                        alt="">
                </button>

            </form>
        </section>

        <section class="buttons-section">
            <div class="buttons">
                <button type="submit">Buscar con Google</button>
                <button type="button">Voy a tener suerte</button>
            </div>
        </section>

    </main>
    <footer>
    <div class="footer-top">
        Ecuador
    </div>

    <div class="footer-bottom">
        <div class="left">
            <a href="#">Sobre Google</a>
            <a href="#">Publicidad</a>
            <a href="#">Negocios</a>
            <a href="#">Cómo funciona la Búsqueda</a>
        </div>

        <div class="right">
            <a href="#">Privacidad</a>
            <a href="#">Condiciones</a>
            <a href="#">Configuración</a>
        </div>
    </div>
</footer>
</body>
</html>
